<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Demo Critical Path Method Network</title>
  <desc id="desc">Diagramme reseau CPM avec huit evenements, des activites etiquetees et des durees.</desc>
  <defs>
    <marker id="arrow" markerWidth="18" markerHeight="14" refX="16" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 17 7 L 1 13 z" fill="#2f6f9f" />
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#16324f" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="720" fill="#f8fbff" />
  <rect x="34" y="34" width="1132" height="652" rx="30" fill="#ffffff" stroke="#d7e5f2" stroke-width="2" />

  <g fill="none" stroke="#2f6f9f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M 151 325 L 252 139" />
    <path d="M 155 361 L 301 562" />
    <path d="M 167 352 L 770 373" />
    <path d="M 310 128 L 809 128" />
    <path d="M 320 153 L 493 244" />
    <path d="M 543 280 L 735 359" />
    <path d="M 370 574 L 657 564" />
    <path d="M 702 531 L 777 413" />
    <path d="M 818 176 L 793 322" />
    <path d="M 862 389 L 1048 330" />
    <path d="M 864 159 L 1058 273" />
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#101827">
    <text x="177" y="223">A(2)</text>
    <text x="430" y="111">D(2)</text>
    <text x="351" y="205">E(1)</text>
    <text x="343" y="338">B(3)</text>
    <text x="207" y="484">C(4)</text>
    <text x="589" y="324">F(3)</text>
    <text x="514" y="609">G(1)</text>
    <text x="704" y="482">H(2)</text>
    <text x="881" y="274">K(5)</text>
    <text x="943" y="380">I(4)</text>
    <text x="1017" y="223">J(5)</text>
  </g>

  <g filter="url(#softShadow)">
    <g fill="#ffffff" stroke="#315875" stroke-width="5">
      <circle cx="126" cy="350" r="57" />
      <circle cx="290" cy="111" r="57" />
      <circle cx="337" cy="576" r="57" />
      <circle cx="527" cy="260" r="57" />
      <circle cx="689" cy="563" r="57" />
      <circle cx="805" cy="373" r="57" />
      <circle cx="841" cy="111" r="57" />
      <circle cx="1101" cy="311" r="57" />
    </g>
    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="900" text-anchor="middle" dominant-baseline="central" fill="#c3192d">
      <text x="126" y="350">1</text>
      <text x="290" y="111">2</text>
      <text x="337" y="576">3</text>
      <text x="527" y="260">4</text>
      <text x="689" y="563">5</text>
      <text x="805" y="373">6</text>
